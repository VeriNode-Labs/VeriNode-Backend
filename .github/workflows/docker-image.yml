name: Docker Image Cache

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-image-cache-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build Docker image with layer cache
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with read-only cache
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: false
          load: false
          tags: verinode-backend:ci
          cache-from: type=gha,scope=verinode-backend-node22

      - name: Build image and update cache
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: false
          load: false
          tags: verinode-backend:ci
          cache-from: type=gha,scope=verinode-backend-node22
          cache-to: type=gha,mode=max,scope=verinode-backend-node22
