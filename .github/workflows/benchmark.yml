name: Benchmark
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Restore baseline
        id: cache
        uses: actions/cache@v4
        with:
          path: baseline-report.json
          key: benchmark-baseline-${{ github.ref_name }}
          restore-keys: benchmark-baseline-main
      - name: Run benchmark
        run: node tests/benchmark.test.js
      - name: Update baseline
        if: github.ref == 'refs/heads/main'
        run: cp benchmark-report.json baseline-report.json
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark-report.json
