name: Security Alert Webhook

on:
  issues:
    types: [opened, labeled]

jobs:
  alert:
    if: contains(github.event.issue.labels.*.name, 'security-critical')
    runs-on: ubuntu-latest
    steps:
      - name: Send alert
        run: |
          curl -X POST "${{ secrets.ALERT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Critical: ${{ github.event.issue.title }}\n${{ github.event.issue.html_url }}\"}"
